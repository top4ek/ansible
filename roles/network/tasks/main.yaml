- name: Set IPv4 forwarding flag
  become: true
  sysctl:
    name: net.ipv4.ip_forward
    sysctl_file: /etc/sysctl.d/ipv4.conf
    value: "1"
    state: present

- name: Set IPv6 forwarding flag
  become: true
  ignore_errors: true
  sysctl:
    name: net.ipv6.conf.all.forwarding
    sysctl_file: /etc/sysctl.d/ipv6.conf
    value: "0"
    state: present

- name: Deleting old firewall daemons
  become: true
  package:
    state: absent
    name:
      - firewalld
    update_cache: yes

- name: Gather service facts for NetworkManager detection
  service_facts:
  when: network_backend == 'auto'

- name: Detect NetworkManager backend
  set_fact:
    network_use_networkmanager: >-
      {{
        network_backend == 'networkmanager'
        or (
          network_backend == 'auto'
          and (
            'NetworkManager.service' in (ansible_facts.services | default({}))
            or 'NetworkManager' in (ansible_facts.services | default({}))
          )
        )
      }}

- name: Rename legacy /etc/network/interfaces when using NetworkManager
  become: true
  command:
    cmd: mv /etc/network/interfaces /etc/network/interfaces-old
  args:
    removes: /etc/network/interfaces
    creates: /etc/network/interfaces-old
  when: network_use_networkmanager
  changed_when: true

- name: Configure network interfaces
  include_tasks: networking.yaml
  when: interfaces is defined

- name: Configure WireGuard
  include_tasks: wireguard.yaml
  when: wireguard is defined and wireguard.interfaces is defined

- name: Configure nftables
  include_tasks: nftables.yaml
  when: interfaces is defined
