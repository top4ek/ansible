---
- name: Ensure rustdesk project directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"
  loop:
    - "{{ rustdesk_container_dir }}"
    - "{{ rustdesk_container_dir }}/data"

- name: Run container
  include_role:
    name: podman
    tasks_from: container.yaml
  vars:
    container_name: "{{ rustdesk_container_name }}"
    podman_compose_dest: "{{ rustdesk_container_dir }}/compose.yaml"
    compose_project_dir: "{{ rustdesk_container_dir }}"
