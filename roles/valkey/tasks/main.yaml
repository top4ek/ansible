---
- name: Ensure container project directory exists
  file:
    path: "{{ valkey_container_dir }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"

- name: Run container
  include_role:
    name: podman
    tasks_from: container.yaml
  vars:
    container_name: "{{ valkey_container_name }}"
    podman_compose_template_src: "compose.yaml.j2"
    podman_compose_dest: "{{ valkey_container_dir }}/compose.yaml"
    compose_project_dir: "{{ valkey_container_dir }}"
