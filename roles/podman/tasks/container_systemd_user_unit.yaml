---
- name: Ensure systemd user unit directory exists
  become: true
  become_user: "{{ admin_user }}"
  file:
    path: "/home/{{ admin_user }}/.config/systemd/user"
    state: directory
    mode: "0755"

- name: Install systemd user unit for compose project
  become: true
  become_user: "{{ admin_user }}"
  template:
    src: "templates/podman-compose-user.service.j2"
    dest: "/home/{{ admin_user }}/.config/systemd/user/{{ container_name }}.service"
    mode: "0644"

- name: Enable and start compose unit
  become: true
  become_user: "{{ admin_user }}"
  ansible.builtin.systemd:
    name: "{{ container_name }}.service"
    enabled: true
    daemon_reload: true
    state: started
    scope: user

- name: Apply changes to compose project
  become: true
  become_user: "{{ admin_user }}"
  ansible.builtin.systemd:
    name: "{{ container_name }}.service"
    state: reloaded
    scope: user
  when: podman_apply | default(false) | bool
