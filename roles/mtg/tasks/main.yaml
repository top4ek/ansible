---
- name: Ensure container project directory exists
  become: true
  file:
    path: "{{ mtg_container_dir }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"

- name: Derive mtg_sni from mtg.secret
  command: "python3 {{ role_path }}/files/hex_sni.py {{ mtg.secret }}"
  delegate_to: localhost
  become: false
  changed_when: false
  register: mtg_sni_cmd

- name: Set mtg_sni
  ansible.builtin.set_fact:
    mtg_sni: "{{ mtg_sni_cmd.stdout | trim }}"

- name: Assert mtg_sni extracted
  ansible.builtin.assert:
    that:
      - mtg_sni is defined
      - mtg_sni | length > 0
    success_msg: "Extracted SNI: {{ mtg_sni }}"
    quiet: true

- name: Generate mtg config
  template:
    src: "config.toml.j2"
    dest: "{{ mtg_container_dir }}/config.toml"

- name: Run container
  include_role:
    name: podman
    tasks_from: container.yaml
  vars:
    container_name: mtg
