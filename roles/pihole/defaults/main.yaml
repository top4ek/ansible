---
pihole_container_name: pihole
pihole_container_dir: "/home/{{ admin_user }}/containers/{{ pihole_container_name }}"

pihole:
  timezone: Europe/Moscow
  webpassword: admin
  dhcp_active: "false"
  upstreams: []
  unbound:
    enabled: true
  hosts: []
  nebula_sync:
    primary: "http://192.168.1.2|admin"
    replicas: "http://192.168.1.3|admin"
    full_sync: "true"
    run_gravity: "true"
    cron: "0 * * * *"
