---
- name: Validate glauth configuration
  ansible.builtin.assert:
    that:
      - glauth.base_dn | default('') | length > 0
      - (glauth.users | default([])) | length > 0
    fail_msg: "glauth.base_dn and glauth.users must be set in host_vars"

- name: Ensure container project directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"
  loop:
    - "{{ glauth_container_dir }}"
    - "{{ glauth_container_dir }}/data"

- name: Render config.cfg
  template:
    src: glauth.cfg.j2
    dest: "{{ glauth_container_dir }}/data/config.cfg"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0644"
  register: glauth_config

- name: Run container
  include_role:
    name: podman
    tasks_from: container.yaml
  vars:
    container_name: "{{ glauth_container_name }}"
    podman_compose_dest: "{{ glauth_container_dir }}/compose.yaml"
    compose_project_dir: "{{ glauth_container_dir }}"
    podman_recreate: "{{ glauth_config is changed }}"
