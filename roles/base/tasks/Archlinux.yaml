- name: Fancy Pacman
  become: true
  ini_file:
    path: /etc/pacman.conf
    section: options
    option: ILoveCandy
    allow_no_value: true

- name: Colored output
  become: true
  ini_file:
    path: /etc/pacman.conf
    section: options
    option: Color
    allow_no_value: true

- name: Enable parallel downloads
  become: true
  ini_file:
    path: /etc/pacman.conf
    section: options
    option: ParallelDownloads
    value: "5"

- name: Enable multilib
  become: true
  ini_file:
    path: /etc/pacman.conf
    section: multilib
    option: Include
    value: "/etc/pacman.d/mirrorlist"

- name: Set clean method
  become: true
  ini_file:
    path: /etc/pacman.conf
    section: options
    option: CleanMethod
    value: KeepInstalled

- name: Install packages
  become: true
  pacman:
    update_cache: yes
    upgrade: yes
    name:
      - base-devel
      - cdrtools
      - curl
      - diffutils
      - fd
      - gnupg
      - go
      - gzip
      - mc
      - net-tools
      - networkmanager
      - nfs-utils
      - openssh
      - p7zip
      - sudo
      - tar
      - terminus-font
      - unrar
      - unzip
      - usbutils
      - wget

- name: Enable NetworkManager service
  become: true
  service:
    name: NetworkManager
    enabled: true
    state: started

- name: Update user
  become: true
  user:
    name: "{{ admin_user }}"
    shell: "/bin/zsh"
    system: yes
    create_home: yes
    expires: -1
    append: yes
    groups:
      - adm
      - audio
      - floppy
      - games
      - input
      - kvm
      - lock
      - log
      - mail
      - mem
      - network
      - optical
      - power
      - render
      - rfkill
      - scanner
      - storage
      - systemd-journal
      - tty
      - users
      - uucp
      - video
      - wheel

- name: Enable passwordless sudo
  become: true
  ignore_errors: true
  lineinfile:
    regexp: "^%wheel"
    line: "%wheel ALL=(ALL) NOPASSWD: ALL"
    state: present
    path: "/etc/sudoers"
