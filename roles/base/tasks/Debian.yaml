---
- name: Disable all apt recommendations and suggestions
  become: true
  copy:
    dest: /etc/apt/apt.conf.d/99local
    content: |-
      APT::Install-Recommends "0";
      APT::Install-Suggests "0";
    owner: root
    group: root
    mode: "0644"

- name: Upgrade system
  become: true
  apt:
    update_cache: yes
    upgrade: full
    autoremove: yes
    purge: yes

- name: Install packages
  become: true
  apt:
    state: latest
    name:
      - apt-transport-https
      - gnupg2
      - openssh-client
      - p7zip-full

- name: Update user
  become: true
  ignore_errors: true
  user:
    name: "{{ admin_user }}"
    shell: "/bin/zsh"
    system: yes
    create_home: yes
    expires: -1
    append: yes
    groups:
      - adm
      - games
      - sudo
      - tty

- name: Enable passwordless sudo
  become: true
  lineinfile:
    regexp: "^%sudo"
    line: "%sudo ALL=(ALL) NOPASSWD: ALL"
    state: present
    path: "/etc/sudoers"
    validate: "/usr/sbin/visudo -cf %s"
